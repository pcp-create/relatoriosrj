<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RJ Compressores | Equipamentos de Locação</title>

  <style>
    :root {
      --azul-rj: #19549B;
      --azul-escuro: #003B73;
      --azul-claro: #EAF4FF;
      --cinza-fundo: #F5F7FA;
      --cinza-texto: #666;
      --branco: #FFFFFF;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--cinza-fundo);
      color: #222;
    }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--azul-rj), var(--azul-escuro));
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--branco);
      border-radius: 18px;
      padding: 34px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .login-card img {
      width: 170px;
      margin-bottom: 18px;
    }

    .login-card h1 {
      color: var(--azul-rj);
      margin: 0;
      font-size: 26px;
    }

    .login-card p {
      color: var(--cinza-texto);
      margin: 10px 0 24px;
      font-size: 15px;
    }

    .input-group {
      text-align: left;
      margin-bottom: 14px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--azul-escuro);
      font-weight: bold;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      height: 46px;
      border: 1px solid #D6DCE5;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 15px;
    }

    button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 10px;
      background: var(--azul-rj);
      color: var(--branco);
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: var(--azul-escuro);
    }

    .error {
      display: none;
      color: #D32F2F;
      font-size: 14px;
      margin-top: 14px;
      font-weight: bold;
    }

    .app {
      display: none;
      min-height: 100vh;
      background: var(--cinza-fundo);
    }

    .header {
      height: 76px;
      background: var(--azul-rj);
      color: var(--branco);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .header img {
      height: 54px;
    }

    .header h2 {
      margin: 0;
      font-size: 28px;
    }

    .logout {
      width: auto;
      height: 38px;
      padding: 0 18px;
      margin: 0;
      background: #FFFFFF;
      color: var(--azul-rj);
      border-radius: 8px;
      font-size: 14px;
    }

    .report-wrapper {
      padding: 16px;
      height: calc(100vh - 76px);
    }

    .report-box {
      width: 100%;
      height: 100%;
      background: var(--branco);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
    }

    .report-box iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 768px) {
      .header {
        height: 62px;
        padding: 0 12px;
      }

      .header img {
        height: 42px;
      }

      .header h2 {
        font-size: 17px;
      }

      .logout {
        height: 32px;
        padding: 0 10px;
        font-size: 12px;
      }

      .report-wrapper {
        padding: 0;
        height: calc(100vh - 62px);
      }

      .report-box {
        border-radius: 0;
        box-shadow: none;
      }

      .report-box iframe {
        width: 100vw;
        height: calc(100vh - 62px);
      }

      .login-card {
        padding: 28px 22px;
      }

      .login-card img {
        width: 145px;
      }

      .login-card h1 {
        font-size: 23px;
      }
    }
  </style>
</head>

<body>
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <img src="rj-logo.png" alt="RJ Compressores" />

      <h1>Equipamentos de Locação</h1>
      <p>Informe seu usuário e senha para acessar o relatório.</p>

      <div class="input-group">
        <label for="user">Usuário</label>
        <input type="text" id="user" placeholder="Digite seu usuário" />
      </div>

      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" />
      </div>

      <button onclick="login()">Entrar</button>

      <div class="error" id="errorMessage">
        Usuário ou senha inválidos.
      </div>
    </div>
  </div>

  <div class="app" id="app">
    <div class="header">
      <div class="header-left">
        <img src="rj-branco.png" alt="RJ Compressores" />
        <h2>Equipamentos de Locação</h2>
      </div>

      <button class="logout" onclick="logout()">Sair</button>
    </div>

    <div class="report-wrapper">
      <div class="report-box">
        <iframe
          title="Equipamentos de Locação"
          src="https://app.powerbi.com/view?r=eyJrIjoiMjcxNjczN2QtZmUyNC00ZjJmLTk5OGEtYzcxYTBiNWIxZGI3IiwidCI6ImZiMmI1MzQ5LTU5MjYtNDU4ZC1iYzA3LTMwZjYxMDhjMjc2OSJ9&pageName=b40d2f92407325ca1d88"
          allowfullscreen="true">
        </iframe>
      </div>
    </div>
  </div>

  <script>
    const users = [
      { user: "rj", password: "RJ@2026" },
      { user: "locacao", password: "Locacao@2026" },
      { user: "admin", password: "Admin@2026" }
    ];

    function login() {
      const user = document.getElementById("user").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMessage = document.getElementById("errorMessage");

      const validUser = users.find(
        item => item.user === user && item.password === password
      );

      if (validUser) {
        localStorage.setItem("rj_logged", "true");
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
        errorMessage.style.display = "none";
      } else {
        errorMessage.style.display = "block";
      }
    }

    function logout() {
      localStorage.removeItem("rj_logged");
      document.getElementById("loginScreen").style.display = "flex";
      document.getElementById("app").style.display = "none";
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        login();
      }
    });

    window.onload = function() {
      if (localStorage.getItem("rj_logged") === "true") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
      }
    };
  </script>
</body>
</html>
